build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

naming:
  active: true
  FunctionNaming:
    active: true
    # Allow PascalCase for @Composable functions
    functionPattern: '[a-z][a-zA-Z0-9]*|[A-Z][a-zA-Z0-9]*'
    excludeClassPattern: '.*'
  ConstructorParameterNaming:
    active: true
    # Allow leading underscore for private properties
    parameterPattern: '[a-z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/jvmTest/**', '**/*.gradle.kts']
    ignoreNumbers: ['-1', '0', '1', '2']
    ignorePropertyDeclaration: true
    ignoreConstantDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    # Ignore @Preview functions
    ignoreAnnotated: ['Preview']
  UnusedPrivateMember:
    active: true
    # Ignore @Preview functions
    ignoreAnnotated: ['Preview']
  MaxLineLength:
    active: true
    maxLineLength: 150

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 40
    thresholdInClasses: 15
  LongParameterList:
    active: true
    # Ignore @Composable functions as they often have many parameters
    ignoreAnnotated: ['Composable']
  ComplexCondition:
    active: true
    threshold: 4

exceptions:
  active: true

empty-blocks:
  active: true

potential-bugs:
  active: true
